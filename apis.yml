aid: loomly
name: Loomly
description: >-
  Loomly is a brand success platform with a REST API for managing social media
  content calendars, post ideas, approval workflows, publishing, and audience
  engagement analytics. It supports 10+ social channels including Facebook,
  Instagram, LinkedIn, TikTok, YouTube, Pinterest, Google Business Profile, and
  Threads, enabling marketing teams to collaborate, schedule, and analyze content
  from a unified platform.
